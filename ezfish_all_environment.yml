# ezfish_all environment
# Combines ezfish (pipeline) + hcr_env (interactive plotting) + bigstream dependencies
#
# USAGE:
#   conda env create -f ezfish_all_environment.yml -p /mnt/colab/shared_envs/ezfish_all
#
# BIGSTREAM SETUP (after creating env):
#   The bigstream fork at bigstream_v2_andermann is added to sys.path at runtime
#   by the pipeline code, OR you can install it into the env:
#
#   conda activate /mnt/colab/shared_envs/ezfish_all
#   pip install -e /mnt/nasquatch/data/2p/jonna/Code_Python/Notebooks_Jonna/BigStream/bigstream_v2_andermann

name: ezfish_all

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python 3.12 from ezfish
  - python=3.12

  # ============ CORE SCIENTIFIC STACK ============
  # numpy <2 required by bigstream
  - numpy>=1.26.0,<2
  - scipy>=1.9.1
  - pandas=2.2.3
  - scikit-image>=0.21.0
  - scikit-learn=1.5.2

  # ============ DEEP LEARNING (PyTorch + CUDA) ============
  - pytorch::pytorch=2.5.1
  - pytorch::torchvision=0.20.1
  - pytorch::torchaudio=2.5.1
  - pytorch::pytorch-cuda=12.1

  # ============ IMAGE I/O & PROCESSING ============
  - tifffile>=2022.10.10
  - imagecodecs=2024.9.22
  - imageio=2.33.1
  - pillow=11.0.0
  - opencv>=4.10.0

  # ============ VISUALIZATION ============
  - matplotlib=3.9.2
  - seaborn=0.13.2
  - bokeh>=2.4.3

  # ============ INTERACTIVE PLOTTING (from hcr_env) ============
  - ipympl=0.9.4
  - ipywidgets=8.1.5
  - widgetsnbextension

  # ============ JUPYTER ============
  - jupyterlab>=4.3
  - ipykernel
  - ipython>=8.12

  # ============ DATA FORMATS ============
  # zarr version for bigstream compatibility
  - zarr>=2.12.0
  - pyarrow=17.0.0
  - h5py>=3.8.0
  - numcodecs>=0.9.1

  # ============ PARALLEL/DISTRIBUTED ============
  - dask>=2023.10.1
  - distributed>=2023.10.1
  - dask-jobqueue=0.9.0
  - numba=0.60.0

  # ============ BIGSTREAM DEPENDENCIES ============
  # SimpleITK - bigstream conda-env says 2.3.1, but setup.py says >=2.2.0
  # Using 2.3.1 to match their conda-env exactly
  - simpleitk=2.3.1
  - pynrrd>=1.0.0
  - pydantic=2.7.1
  - flatten_json

  # ============ UTILITIES ============
  - tqdm
  - rich
  - natsort
  - networkx
  - joblib
  - pyyaml

  # ============ GUI BACKENDS ============
  - pyqt=5.15

  # ============ PIP PACKAGES ============
  - pip
  - pip:
    # Cell segmentation
    - cellpose>=3.1.0

    # Suite2p for 2-photon processing
    - suite2p>=0.14.4

    # ClusterWrap - specific commit required by bigstream
    - git+https://github.com/GFleishman/ClusterWrap.git@fa718ac49

    # ScanBox reader
    - sbxreader>=0.2.2

    # ROI file support
    - roifile

    # StackReg for hi-res SBX tile motion correction
    - pystackreg>=0.2.7

    # UMAP for dimensionality reduction
    - umap-learn>=0.5.6

    # Statistics
    - statsmodels>=0.14.1

    # Interactive dashboards
    - plotly>=5.0

    # XGBoost
    - xgboost>=2.1.1

    # Fast remapping for segmentation
    - fastremap>=1.15.0

    # Bigstream dependencies
    - fishspot>=0.3.0
    - morphsnakes>=2.0.0

    # Config file parsing
    - hjson
